<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>QuickTask</title>
</head>
<body>
    <div class="container">
        <h1>My Tasks</h1>
        
        <form method="POST">
            <input type="text" name="task_content" placeholder="Enter a new task..." required>
            <button type="submit">Add Task</button>
        </form>

        <hr>

        <ul>
            {% for task in tasks %}
                <li>{{ task }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
