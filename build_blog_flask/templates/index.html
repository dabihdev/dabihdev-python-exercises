{% extends 'base.html' %}

{% block content %}
    <h1>{% block title %} Posts {% endblock %}</h1>
    {% for post in posts %}
        <div class="post">
            <h2>{{ post.title }}</h2>
            <span class="badge">{{ post.created.strftime('%Y-%m-%d') }}</span>
            <p>{{ post.content }}</p>
            
            <form action="{{ url_for('delete', id=post.id) }}" method="POST">
                <input type="submit" value="Delete Post"
                       class="btn-delete"
                       onclick="return confirm('Are you sure you want to delete this post?')">
            </form>
            <hr>
        </div>
    {% endfor %}
{% endblock %}
